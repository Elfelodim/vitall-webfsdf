<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña | ClickSalud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--gray-50);
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-card .logo {
            justify-content: center;
            margin-bottom: 2rem;
        }
        .login-card h2 {
            color: var(--blue-dark);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--gray-500);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
        }
        #errorMsg {
            color: #ef4444;
            font-size: 0.85rem;
            background: #fef2f2;
            padding: 0.8rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="ClickSalud Logo" style="height: 70px; object-fit: contain;">
            </a>
            <h2>Cambio Necesario</h2>
            <p>Por seguridad, debes crear una contraseña propia que solo tú conozcas.</p>
            
            <div id="errorMsg"><i class="ph-bold ph-warning-circle"></i> Las contraseñas no coinciden.</div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="newPass">Nueva Contraseña</label>
                    <input type="password" id="newPass" required placeholder="Ingresa al menos 6 caracteres" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPass">Confirma Contraseña</label>
                    <input type="password" id="confirmPass" required placeholder="Repite la contraseña">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="btnSave">Guardar y Entrar</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getCurrentUser();
            if(!user || !user.must_change_password) {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;
            const btn = document.getElementById('btnSave');
            const errorDiv = document.getElementById('errorMsg');

            if(pass1 !== pass2) {
                errorDiv.textContent = 'Las contraseñas no coinciden.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.textContent = "Actualizando...";
            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const user = Auth.getCurrentUser();
                const newHash = await Auth.hashPassword(pass1);

                // Update in Supabase
                const client = Auth.getClient();
                if(client) {
                    const { error } = await client
                        .from('usuarios')
                        .update({ password_hash: newHash, must_change_password: false })
                        .eq('email', user.email);

                    if(error) {
                        console.warn("No se pudo conectar a la DB real. Simulando en local.");
                    }
                }

                // Update local session
                user.must_change_password = false;
                localStorage.setItem('clicksalud_session', JSON.stringify(user));

                // Redirect based on roles
                if(user.modulos.includes('gestion')) window.location.href = 'gestion.html';
                else if(user.modulos.includes('admin')) window.location.href = 'admin.html';
                else if(user.modulos.includes('sistemas')) window.location.href = 'configuracion.html';
                else window.location.href = 'index.html';

            } catch (error) {
                errorDiv.textContent = 'Hubo un error del sistema. Reintenta.';
                errorDiv.style.display = 'block';
                btn.textContent = "Guardar y Entrar";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
