<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Agenda Diaria | ClickSalud</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .agenda-layout {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        .filter-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            height: fit-content;
        }

        .view-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .t-slot {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 1.2rem;
            align-items: center;
        }

        .t-time {
            font-weight: bold;
            color: var(--blue-dark);
            text-align: right;
            border-right: 2px solid var(--green);
            padding-right: 1rem;
        }

        .t-time.empty {
            border-color: var(--gray-300);
            color: var(--gray-400);
        }

        .t-card {
            background: #f8fafc;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .t-card:hover { border-color: var(--blue-main); }
        
        .t-card.empty-card {
            background: transparent;
            border-style: dashed;
            color: var(--gray-400);
            justify-content: center;
            font-style: italic;
        }

        .t-card.break-card {
            background: var(--yellow-light);
            border-color: #fde047;
            color: #854d0e;
            justify-content: center;
            font-weight: 600;
        }

        .t-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .bg-tag-control { background: #e0e7ff; color: #4338ca; }
        .bg-tag-primer { background: #dcfce7; color: #15803d; }
        .bg-tag-examen { background: #fce7f3; color: #be185d; }

        @media (max-width: 768px) {
            .agenda-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar igual que admin -->
    <header class="navbar scrolled" style="position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);">
        <div class="container nav-container" style="justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="admin.html" class="logo">
                     <i class="ph-bold ph-arrow-left" style="font-size: 1.2rem; color: var(--blue-dark);"></i>
                     <img src="assets/images/logo.png" alt="Logo" style="height: 50px; margin-left: 1rem; object-fit: contain;">
                </a>
                <span class="badge" style="background: var(--blue-light); color: var(--blue-dark);">Recepción de Turnos</span>
            </div>
            <div class="header-user-info"></div>
        </div>
    </header>

    <main class="agenda-layout">
        
        <!-- Panel Izquierdo: Filtros -->
        <div class="filter-panel">
            <h3 style="margin-bottom: 1.5rem; color: var(--blue-dark); border-bottom: 1px solid var(--gray-200); padding-bottom: 0.8rem;">
                <i class="ph-fill ph-funnel"></i> Filtros de Agenda
            </h3>
            
            <div class="form-group">
                <label>Fecha de Consulta</label>
                <input type="date" id="filterDate" required>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Seleccionar Médico</label>
                <select id="filterDoctor">
                    <option value="" disabled selected>Cargando médicos...</option>
                </select>
            </div>

            <button class="btn btn-primary-outline btn-block" style="margin-top: 1.5rem;" id="btnLoadAgenda">
                <i class="ph-bold ph-magnifying-glass"></i> Ver Turnos
            </button>
        </div>

        <!-- Panel Derecho: Vista del Cronograma -->
        <div class="view-panel">
            <div style="display: flex; justify-content: space-between; align-items: start; border-bottom: 1px solid var(--gray-200); padding-bottom: 1.5rem;">
                <div>
                    <h2 id="viewMedName" style="color: var(--blue-dark); margin-bottom: 0.2rem;">Selecciona un Médico</h2>
                    <p id="viewDateDesc" style="color: var(--gray-500); margin:0;">y una fecha para ver su cronograma</p>
                </div>
            </div>

            <div class="timeline" id="agendaTimeline">
                <div style="text-align: center; padding: 3rem; color: var(--gray-400);">
                    <i class="ph-fill ph-calendar-blank" style="font-size: 4rem;"></i>
                    <p>La agenda se mostrará aquí</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Detalles Paciente -->
    <div id="patientModal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:8px; padding:2rem; max-width:500px; width:90%;">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3 style="color:var(--blue-dark);"><i class="ph-fill ph-user"></i> Datos del Paciente</h3>
                <button onclick="document.getElementById('patientModal').style.display='none'" style="border:none; background:transparent; font-size:1.5rem; cursor:pointer;"><i class="ph ph-x"></i></button>
            </div>
            <div id="patientDetails" style="font-size:0.95rem; line-height:1.6;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="agenda_turnos.js"></script>
</body>
</html>
