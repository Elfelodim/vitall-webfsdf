<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ClickSalud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--gray-50);
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-card .logo {
            justify-content: center;
            margin-bottom: 2rem;
        }
        .login-card h2 {
            color: var(--blue-dark);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--gray-500);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
        }
        #loginError {
            color: #ef4444;
            font-size: 0.85rem;
            background: #fef2f2;
            padding: 0.8rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="ClickSalud Logo" style="height: 70px; object-fit: contain;">
            </a>
            <h2>Acceso a Plataforma</h2>
            <p>Ingresa tus credenciales para continuar</p>
            
            <div id="loginError"><i class="ph-bold ph-warning-circle"></i> Usuario o contraseña incorrectos.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required placeholder="ejemplo@clicksalud.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Ingresar ahora</button>
            </form>
            <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--gray-500);">Solo personal autorizado</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            btn.textContent = "Verificando...";
            btn.disabled = true;
            errorDiv.style.display = 'none';

            const success = await Auth.login(email, pass);
            
            if(success) {
                // Redirigir al primer módulo al que tenga acceso
                const user = Auth.getCurrentUser();
                if(user.modulos.includes('gestion')) window.location.href = 'gestion.html';
                else if(user.modulos.includes('admin')) window.location.href = 'admin.html';
                else if(user.modulos.includes('sistemas')) window.location.href = 'configuracion.html';
                else window.location.href = 'index.html'; // Fallback
            } else {
                errorDiv.style.display = 'block';
                btn.textContent = "Ingresar ahora";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
